version: '3.8'

services:
    keycloak:
        image: bitnami/keycloak:latest
        environment:
            - KEYCLOAK_ADMIN=admin
            - KEYCLOAK_ADMIN_PASSWORD=admin
            - KEYCLOAK_PORT=8080
            - KEYCLOAK_DATABASE_HOST=keycloak_postgresql
            - KEYCLOAK_DATABASE_USER=keycloak_user
            - KEYCLOAK_DATABASE_PASSWORD=keycloak_password
            - KEYCLOAK_DATABASE_NAME=keycloak_db
            - KEYCLOAK_PRODUCTION=false
        depends_on:
            - keycloak_postgresql
        ports:
            - "18080:8080"

    keycloak_postgresql:
        image: docker.io/bitnami/postgresql:latest
        environment:
            - POSTGRESQL_PASSWORD=keycloak_password
            - POSTGRESQL_USERNAME=keycloak_user
            - POSTGRESQL_DATABASE=keycloak_db
        volumes:
            - postgresql_data:/bitnami/postgresql

    postgresql:
        image: docker.io/bitnami/postgresql:latest
        environment:
            - POSTGRESQL_PASSWORD=password
            - POSTGRESQL_USERNAME=user
            - POSTGRESQL_DATABASE=database
        volumes:
            - pgdata:/bitnami/postgresql
        ports:
            - "5432:5432"

    controller-1:
        image: apache/kafka:latest
        container_name: controller-1
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: controller
            KAFKA_LISTENERS: CONTROLLER://:9093
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    controller-2:
        image: apache/kafka:latest
        container_name: controller-2
        environment:
            KAFKA_NODE_ID: 2
            KAFKA_PROCESS_ROLES: controller
            KAFKA_LISTENERS: CONTROLLER://:9093
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    controller-3:
        image: apache/kafka:latest
        container_name: controller-3
        environment:
            KAFKA_NODE_ID: 3
            KAFKA_PROCESS_ROLES: controller
            KAFKA_LISTENERS: CONTROLLER://:9093
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    broker-1:
        image: apache/kafka:latest
        container_name: broker-1
        ports:
            - "29092:9092"
        environment:
            KAFKA_NODE_ID: 4
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://localhost:29092'
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        depends_on:
            - controller-1
            - controller-2
            - controller-3

    broker-2:
        image: apache/kafka:latest
        container_name: broker-2
        ports:
            - "39092:9092"
        environment:
            KAFKA_NODE_ID: 5
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:19092,PLAINTEXT_HOST://localhost:39092'
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        depends_on:
            - controller-1
            - controller-2
            - controller-3

    broker-3:
        image: apache/kafka:latest
        container_name: broker-3
        ports:
            - "49092:9092"
        environment:
            KAFKA_NODE_ID: 6
            KAFKA_PROCESS_ROLES: broker
            KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-3:19092,PLAINTEXT_HOST://localhost:49092'
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        depends_on:
            - controller-1
            - controller-2
            - controller-3

    consul-server:
        image: hashicorp/consul:latest
        container_name: consul-server
        restart: always
        volumes:
            - ./server.json:/consul/config/server.json:ro
        ports:
            - "8500:8500"
            - "8600:8600/tcp"
            - "8600:8600/udp"
        command: "agent"
        networks:
            - consul-network

networks:
    consul-network:
        driver: bridge

volumes:
    pgdata:
    postgresql_data:
        driver: local

